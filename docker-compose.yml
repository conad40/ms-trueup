services:
  db:
    image: postgres:16-alpine
    container_name: trueup-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trueup
      POSTGRES_USER: trueup
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeNow!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trueup"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: trueup-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: trueup
      DB_USER: trueup
      DB_PASS: ${DB_PASSWORD:-ChangeMeNow!}
    ports:
      - "3000:8000"
    volumes:
      - ./db/migrations:/app/migrations:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.git:/app/.git

volumes:
  pgdata:
